services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bookclub
      POSTGRES_PASSWORD: bookclub
      POSTGRES_DB: bookclub
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookclub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      - DATABASE_URL=postgresql+psycopg://bookclub:bookclub@db:5432/bookclub
      - REDIS_URL=redis://redis:6379/0
      - LOCAL_LLM_BASE_URL=http://ollama:11434/v1
      - LOCAL_EMBEDDINGS_BASE_URL=http://ollama:11434/v1
      - BOOKS_DIR=/books
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - book_storage:/app/storage
      - ${BOOKS_DIR:-./books}:/books:ro

  worker:
    build:
      context: ./apps/api
    command: python run_worker.py
    environment:
      - DATABASE_URL=postgresql+psycopg://bookclub:bookclub@db:5432/bookclub
      - REDIS_URL=redis://redis:6379/0
      - LOCAL_LLM_BASE_URL=http://ollama:11434/v1
      - LOCAL_EMBEDDINGS_BASE_URL=http://ollama:11434/v1
      - BOOKS_DIR=/books
    env_file:
      - ./apps/api/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - book_storage:/app/storage
      - ${BOOKS_DIR:-./books}:/books:ro

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - api

  # VibeVoice Realtime TTS (OpenAI-compatible)
  # Start with: docker compose --profile gpu up
  vibevoice:
    profiles: ["gpu"]
    build:
      context: ./vibevoice
    ports:
      - "8880:8880"
    volumes:
      - ./vibevoice/models:/home/ubuntu/app/models
    environment:
      - CFG_SCALE=1.25
      - OPTIMIZE_FOR_SPEED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Ollama for open-source LLM support
  # Start with: docker compose --profile local up
  ollama:
    profiles: ["local"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  db_data:
  book_storage:
  ollama_data:
